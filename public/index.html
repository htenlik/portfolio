<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hüseyin Tenlik — Portfolio</title>
    <meta
      name="description"
      content="The personal portfolio of Hüseyin Tenlik is currently under construction."
    />
    <meta name="theme-color" content="#09090b" />

    <!-- Remove this line when the full portfolio is ready to be indexed. -->
    <meta name="robots" content="noindex, nofollow" />

    <meta property="og:title" content="Hüseyin Tenlik — Portfolio" />
    <meta
      property="og:description"
      content="A new portfolio experience is currently being built."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://htenlik.com" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <div class="background" aria-hidden="true">
      <div class="glow glow-one"></div>
      <div class="glow glow-two"></div>
      <div class="grid"></div>
    </div>

    <main class="shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Hüseyin Tenlik home">
          <span class="brand-mark">HT</span>
          <span class="brand-name">Hüseyin Tenlik</span>
        </a>

        <a
          class="github-link"
          href="https://github.com/htenlik"
          target="_blank"
          rel="noreferrer"
        >
          GitHub
          <span aria-hidden="true">↗</span>
        </a>
      </header>

      <section class="hero">
        <div class="status">
          <span class="status-dot" aria-hidden="true"></span>
          Portfolio in progress
        </div>

        <p class="eyebrow">Software Engineer</p>

        <h1>
          Something thoughtful
          <span>is taking shape.</span>
        </h1>

        <p class="intro">
          I’m building a focused portfolio for the systems, products, and
          engineering work I’m most proud of.
        </p>

        <div class="actions">
          <a
            class="button button-primary"
            href="https://github.com/htenlik"
            target="_blank"
            rel="noreferrer"
          >
            Explore my GitHub
          </a>
          <span class="domain">htenlik.com</span>
        </div>
      </section>

      <footer class="footer">
        <span>© <span id="year"></span> Hüseyin Tenlik</span>
        <span>Launching soon.</span>
      </footer>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
