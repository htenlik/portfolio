<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="t d"><title id="t">Four by four MPI torus topology</title><desc id="d">Sixteen processes in a four by four grid with horizontal and vertical wrap-around links. Process zero is the highlighted gather root.</desc><defs><marker id="arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0 7 3.5 0 7Z" fill="#4f769d"/></marker></defs><rect width="900" height="480" fill="#f2f6fa"/><text x="450" y="38" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#284e74">MPI GATHER · 4×4 TORUS TOPOLOGY</text><g fill="none" stroke="#9bb2c7" stroke-width="4"><path d="M180 110H720M180 200H720M180 290H720M180 380H720M180 110V380M360 110V380M540 110V380M720 110V380"/><path d="M180 110C60 110 60 380 180 380M720 110c120 0 120 270 0 270M180 110c0-75 540-75 540 0M180 380c0 75 540 75 540 0" stroke-dasharray="9 7"/></g><g fill="none" stroke="#4f769d" stroke-width="3" marker-end="url(#arrow)"><path d="M685 110h-92M505 110h-92M325 110h-92M720 145v92M540 145v92M360 145v92M180 345v-92M685 380h-92M505 380h-92M325 380h-92"/></g><g font-family="Arial" text-anchor="middle" font-size="14" font-weight="bold"> <g fill="#e7eef5" stroke="#315a82" stroke-width="3"><circle cx="180" cy="110" r="28" fill="#f0a82d" stroke="#805300"/><circle cx="360" cy="110" r="28"/><circle cx="540" cy="110" r="28"/><circle cx="720" cy="110" r="28"/><circle cx="180" cy="200" r="28"/><circle cx="360" cy="200" r="28"/><circle cx="540" cy="200" r="28"/><circle cx="720" cy="200" r="28"/><circle cx="180" cy="290" r="28"/><circle cx="360" cy="290" r="28"/><circle cx="540" cy="290" r="28"/><circle cx="720" cy="290" r="28"/><circle cx="180" cy="380" r="28"/><circle cx="360" cy="380" r="28"/><circle cx="540" cy="380" r="28"/><circle cx="720" cy="380" r="28"/></g><g fill="#203d5a"><text x="180" y="115">P0</text><text x="360" y="115">P1</text><text x="540" y="115">P2</text><text x="720" y="115">P3</text><text x="180" y="205">P4</text><text x="360" y="205">P5</text><text x="540" y="205">P6</text><text x="720" y="205">P7</text><text x="180" y="295">P8</text><text x="360" y="295">P9</text><text x="540" y="295">P10</text><text x="720" y="295">P11</text><text x="180" y="385">P12</text><text x="360" y="385">P13</text><text x="540" y="385">P14</text><text x="720" y="385">P15</text></g></g><text x="180" y="76" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#805300">GATHER ROOT</text><text x="450" y="458" text-anchor="middle" font-family="Arial" font-size="12" fill="#5b7085">Dashed curves represent horizontal and vertical wrap-around links.</text></svg>
